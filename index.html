<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PT Berjaya Makmur Indonesia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#004e92,#000428);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;

}

/* Background Animation */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:rgba(255,255,255,.05);
border-radius:50%;
top:-200px;
right:-200px;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.04);
border-radius:50%;
bottom:-200px;
left:-200px;
}

.card{

width:90%;
max-width:430px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(12px);

padding:40px 30px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.3);

text-align:center;

animation:fade .8s ease;

z-index:2;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

width:90px;
margin-bottom:20px;

}

h1{

font-size:28px;
margin-bottom:10px;

}

p{

color:#ddd;
margin-bottom:30px;
line-height:1.6;

}

.btn{

display:block;

width:100%;

padding:15px;

margin:12px 0;

text-decoration:none;

border-radius:12px;

font-size:17px;

font-weight:bold;

transition:.3s;

color:white;

}

.website{
background:#0d6efd;
}

.website:hover{
background:#0b5ed7;
transform:translateY(-2px);
}

.plumbing{
background:#198754;
}

.plumbing:hover{
background:#157347;
transform:translateY(-2px);
}

.hydrant{
background:#dc3545;
}

.hydrant:hover{
background:#bb2d3b;
transform:translateY(-2px);
}

.contact{
background:#25D366;
}

.contact:hover{
background:#20ba5a;
transform:translateY(-2px);
}

.footer{

margin-top:25px;

font-size:13px;

color:#ccc;

}

</style>

</head>

<body>

<div class="card">

<!-- Ganti logo.png dengan logo perusahaan -->
